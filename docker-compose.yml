services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-carlesso_pilates}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "${DB_HOST_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-carlesso_pilates}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8080:8080"
    # Limite de memória do container: é ele que dá sentido ao
    # -XX:MaxRAMPercentage — sem limite, a JVM dimensiona a heap pela RAM do host.
    mem_limit: ${APP_MEM_LIMIT:-1g}
    environment:
      JAVA_OPTS: ${JAVA_OPTS:--XX:MaxRAMPercentage=75.0}
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-carlesso_pilates}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET environment variable is required}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-86400000}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:4200}
      APP_INITIAL_ADMIN_EMAIL: ${APP_INITIAL_ADMIN_EMAIL:-admin@carlessopilates.com}
      APP_INITIAL_ADMIN_PASSWORD: ${APP_INITIAL_ADMIN_PASSWORD:-}
      APP_COBRANCA_CRON_VENCIDOS: ${APP_COBRANCA_CRON_VENCIDOS:-0 0 6 * * *}
      APP_COBRANCA_CRON_COBRANCAS_FUTURAS: ${APP_COBRANCA_CRON_COBRANCAS_FUTURAS:-0 0 7 * * *}
      APP_COBRANCA_VENCIMENTO_DIAS: ${APP_COBRANCA_VENCIMENTO_DIAS:-10}
      APP_PAGINACAO_TAMANHO_PADRAO: ${APP_PAGINACAO_TAMANHO_PADRAO:-10}
      APP_EMAIL_PROVIDER: ${APP_EMAIL_PROVIDER:-smtp}
      APP_EMAIL_FROM: ${APP_EMAIL_FROM:-no-reply@carlessopilates.com.br}
      APP_EMAIL_RESET_PASSWORD_URL: ${APP_EMAIL_RESET_PASSWORD_URL:-https://app.carlessopilates.com.br/resetar-senha}
      APP_EMAIL_RESET_PASSWORD_TOKEN_TTL_MINUTOS: ${APP_EMAIL_RESET_PASSWORD_TOKEN_TTL_MINUTOS:-30}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
    depends_on:
      db:
        condition: service_healthy
