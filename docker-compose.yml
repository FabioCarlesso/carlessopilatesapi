services:
  db:
    image: postgres:16-alpine
    container_name: carlesso_pilates_db
    environment:
      POSTGRES_DB: carlesso_pilates
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d carlesso_pilates"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: carlesso_pilates_app
    ports:
      - "8080:8080"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: carlesso_pilates
      DB_USER: postgres
      DB_PASSWORD: postgres
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
