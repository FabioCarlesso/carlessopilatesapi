spring.flyway.locations=classpath:db/migration

spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

management.endpoints.web.exposure.include=health,prometheus
management.endpoint.health.show-details=never

# Documentação da API (OpenAPI/Swagger) desabilitada em produção para não expor
# o mapa completo da API publicamente. As rotas /api-docs e /swagger-ui passam a
# retornar 404 no perfil prod; permanecem acessíveis em dev/default.
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false
