name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

# Cancela execuções obsoletas do mesmo branch/PR para economizar recursos.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Etapa 1 — compila a aplicação e roda toda a suíte de testes (H2 em memória).
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build e testes (mvn verify)
        run: mvn -B verify

      - name: Publica relatórios de teste
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: surefire-reports
          path: target/surefire-reports/
          if-no-files-found: ignore
          retention-days: 7

      - name: Publica relatório de cobertura (JaCoCo)
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: jacoco-report
          path: target/site/jacoco/
          if-no-files-found: ignore
          retention-days: 7

  # Etapa 2 — aplica as migrations Flyway contra um PostgreSQL real.
  # Fecha o gap dos testes, que rodam em H2 com Flyway desabilitado.
  flyway-postgres:
    name: Flyway migrations (PostgreSQL)
    runs-on: ubuntu-latest
    needs: build-test
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: carlesso_pilates
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d carlesso_pilates"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Aplica as migrations (flyway:migrate)
        run: >-
          mvn -B flyway:migrate
          -Dflyway.url=jdbc:postgresql://localhost:5432/carlesso_pilates
          -Dflyway.user=postgres
          -Dflyway.password=postgres

      - name: Valida as migrations aplicadas (flyway:validate)
        run: >-
          mvn -B flyway:validate
          -Dflyway.url=jdbc:postgresql://localhost:5432/carlesso_pilates
          -Dflyway.user=postgres
          -Dflyway.password=postgres

  # Etapa 3 — garante que o Dockerfile multi-stage builda a imagem (sem push).
  docker-build:
    name: Docker image build
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build da imagem (sem push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: carlessopilatesapi:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
